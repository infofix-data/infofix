<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>info-fix</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 min-h-screen text-slate-100">
<div class="max-w-7xl mx-auto p-6">

<header class="mb-8 flex items-center justify-between">
  <div>
    <h1 class="text-3xl md:text-4xl font-black">AI Stock Metadata Generator</h1>
    <p class="text-slate-400 text-sm">Batch process images or text using Gemini or ChatGPT</p>
  </div>
</header>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

<section class="bg-slate-900/70 backdrop-blur-xl border border-white/10 rounded-2xl p-6 shadow-xl space-y-5">
  <h2 class="font-bold text-lg">Inputs</h2>

  <div>
    <label class="text-xs uppercase tracking-wider text-slate-400">Select API</label>
    <select id="apiSelect" class="mt-1 w-full bg-slate-950 border border-white/10 rounded-xl p-3 outline-none focus:ring-2 focus:ring-indigo-500">
      <option value="gemini">Gemini (Image)</option>
      <option value="chatgpt">ChatGPT (Text Only)</option>
    </select>
  </div>

  <div>
    <label class="text-xs uppercase tracking-wider text-slate-400">API Key</label>
    <input id="apiKey" type="password" placeholder="Paste your API key"
      class="mt-1 w-full bg-slate-950 border border-white/10 rounded-xl p-3 outline-none focus:ring-2 focus:ring-indigo-500"/>
  </div>

  <div id="imageSection">
    <label class="text-xs uppercase tracking-wider text-slate-400">Upload Images (Multiple)</label>
    <input id="imageInput" type="file" accept="image/*" multiple
      class="mt-2 w-full text-sm file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-700"/>
    <p class="text-[11px] text-slate-500 mt-1">Select multiple images for Gemini.</p>
  </div>

  <div>
    <div class="flex justify-between text-xs text-slate-400 mb-1">
      <span>Title Length (chars)</span><span id="titleVal">70</span>
    </div>
    <input id="titleSlider" type="range" min="30" max="150" value="70"
      oninput="titleVal.textContent=this.value" class="w-full accent-indigo-500"/>
  </div>

  <div>
    <div class="flex justify-between text-xs text-slate-400 mb-1">
      <span>Keywords (count)</span><span id="kwVal">30</span>
    </div>
    <input id="kwSlider" type="range" min="10" max="60" value="30"
      oninput="kwVal.textContent=this.value" class="w-full accent-fuchsia-500"/>
  </div>

  <button id="genBtn" onclick="generateBatch()"
    class="w-full py-4 rounded-xl bg-indigo-600 hover:bg-indigo-700 font-bold tracking-wide transition">
    Generate Metadata
  </button>

  <p id="toast" class="hidden text-sm rounded-lg px-3 py-2 border"></p>
</section>

<section class="bg-slate-900/70 backdrop-blur-xl border border-white/10 rounded-2xl p-6 shadow-xl space-y-4">
  <h2 class="font-bold text-lg">Batch Results</h2>
  <div id="resultsList" class="space-y-3 max-h-[60vh] overflow-y-auto"></div>
  <button onclick="downloadBatchCSV()" class="w-full py-3 rounded-xl bg-emerald-600 hover:bg-emerald-700 font-bold">
    Download All as CSV
  </button>
</section>

</div>
</div>

<script>
const results = [];
const toast = (msg, ok=true) => {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = "block text-sm rounded-lg px-3 py-2 border " + (ok
    ? "bg-emerald-500/10 border-emerald-500/20 text-emerald-300"
    : "bg-rose-500/10 border-rose-500/20 text-rose-300");
  setTimeout(()=> t.classList.add('hidden'), 3000);
};

function toBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload=()=>resolve(reader.result);
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

async function generateBatch(){
  const apiType = document.getElementById('apiSelect').value;
  const apiKey = document.getElementById('apiKey').value.trim();
  const titleLen = document.getElementById('titleSlider').value;
  const kwCount = document.getElementById('kwSlider').value;
  const btn = document.getElementById('genBtn');
  results.length = 0;
  document.getElementById('resultsList').innerHTML = "";

  if(!apiKey){
    toast("API key is required", false);
    return;
  }

  btn.disabled = true;
  btn.textContent = "Processing...";

  try{
    if(apiType==="chatgpt"){
      const prompt = `Generate JSON metadata for a stock photo:
"title": (~${titleLen} chars),
"keywords": (exactly ${kwCount} comma-separated).
Return ONLY valid JSON.`;

      const response = await fetch("https://api.openai.com/v1/chat/completions",{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "Authorization":`Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model:"gpt-4",
          messages:[{role:"user", content:prompt}],
          temperature:0.7
        })
      });

      const data = await response.json();
      let text = data.choices[0].message.content.replace(/```json|```/g,"").trim();
      const meta = JSON.parse(text);
      results.push({filename:"ChatGPT", ...meta});
      appendResultCard("ChatGPT", meta.title, meta.keywords);
    }
    else{
      const files = document.getElementById('imageInput').files;
      if(!files.length){ toast("Select at least one image for Gemini", false); btn.disabled=false; return;}
      for(let i=0;i<files.length;i++){
        const file = files[i];
        btn.textContent = `Processing ${i+1}/${files.length}...`;
        const base64Image = await toBase64(file);
        const base64Data = base64Image.split(',')[1];
        const url = `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
        const payload = {
          contents:[{
            parts:[
              { text:`Return ONLY valid JSON for this stock photo with fields:
"title" (~${titleLen} chars),
"keywords" (exactly ${kwCount} comma-separated).`},
              { inlineData:{mimeType:file.type, data:base64Data} }
            ]
          }]
        };
        const res = await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload)});
        const json = await res.json();
        if(json.error) throw new Error(json.error.message||"API error");
        let text = json.candidates?.[0]?.content?.parts?.[0]?.text.replace(/```json|```/g,"").trim();
        const meta = JSON.parse(text);
        results.push({filename:file.name, ...meta});
        appendResultCard(file.name, meta.title, meta.keywords);
      }
    }
    toast("Processing complete!");
  }
  catch(e){ toast(e.message||"Error occurred", false);}
  finally{ btn.disabled=false; btn.textContent="Generate Metadata";}
}

function appendResultCard(name, title, keywords){
  const wrap = document.getElementById('resultsList');
  const div = document.createElement('div');
  div.className="bg-slate-950 border border-white/10 rounded-xl p-3";
  div.innerHTML=`<p class="text-xs text-slate-400 mb-1">${name}</p>
  <p class="font-semibold">${title}</p>
  <p class="text-xs italic text-slate-400 mt-1">${keywords}</p>`;
  wrap.appendChild(div);
}

function downloadBatchCSV(){
  if(!results.length){ toast("No results to export", false); return;}
  let csv="Filename;Title;Keywords\n";
  results.forEach(r=>{
    csv+=`"${r.filename.replace(/"/g,'""')}";"${r.title.replace(/"/g,'""')}";"${r.keywords.replace(/"/g,'""')}"\n`;
  });
  const uri=encodeURI("data:text/csv;charset=utf-8,"+csv);
  const a=document.createElement("a");
  a.href=uri;a.download="metadata_batch.csv";document.body.appendChild(a);a.click();document.body.removeChild(a);
}
</script>
</body>
</html>
